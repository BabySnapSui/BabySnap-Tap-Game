<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baby Snap Tap Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

#snap{
width:250px;
cursor:pointer;
}

.stat{
font-size:22px;
margin:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
margin:8px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Baby Snap Tap Game</h1>

<div class="stat" id="score">Score: 0</div>
<div class="stat" id="energy">Energy: 100</div>

<img id="snap" src="baby-snap.png.jpg">

<br>

<button id="daily">Daily Reward</button>
<button id="leader">Leaderboard</button>

<script>

const tg = window.Telegram.WebApp
tg.ready()
tg.expand()

let score = 0
let energy = 100

const scoreEl = document.getElementById("score")
const energyEl = document.getElementById("energy")
const snap = document.getElementById("snap")

snap.onclick = () => {

if(energy <= 0) return

score += 1
energy -= 1

scoreEl.innerText = "Score: " + score
energyEl.innerText = "Energy: " + energy

}

setInterval(()=>{

if(energy < 100){
energy += 1
energyEl.innerText = "Energy: " + energy
}

},3000)

</script>

</body>
</html>
